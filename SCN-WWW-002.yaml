scenario:
  id: SCN-WWW-002
  title: "Guest purchases Tread with credit card"
  app: www
  criticality: P0
  preconditions:
    - user is unauthenticated
    - Tread is in stock for US locale
    - test account credentials are available via environment
    - Stripe test credit card 4242 4242 4242 4242 is used for payment
  steps:
    - dismiss any country selection or cookie consent dialog if present
    - hover over "Tread" in the top navigation bar
    - click the "Shop Tread" button in the dropdown menu that appears
    - click the "Add to cart" button on the Tread package page
    - click the "Review cart" button in the cart drawer that appears
    - click the checkout link to proceed to checkout
    - enter a test email address in the email field and click "Continue"
    - skip the warranty option
    - fill in shipping details (first name, last name, address, city, state, zip, phone) and click "Continue"
    - select the standard assembly option and click "Continue"
    - click the "Credit Card" payment option
    - enter test card number 4242 4242 4242 4242, a future expiry date, and any CVV, then click "Review Order"
    - click "Place Order" to complete the purchase
  acceptance_criteria:
    - the order confirmation page is displayed
    - an order confirmation number or ID is visible on the page
    - the product name "Tread" is visible in the order summary
    - the page is not visually showing an error state or 404 page
